# 邮箱自动化配置文件
# 请根据你的邮箱信息修改下面的配置

[SERVER]
# IMAP服务器地址
# 常用邮箱服务器：
# QQ邮箱：imap.qq.com
# 163邮箱：imap.163.com  
# Gmail：imap.gmail.com
# 企业邮箱：请咨询IT部门
imap_host = imap.qq.com

# IMAP端口（通常993为SSL，143为非SSL）
imap_port = 993

# 是否使用SSL连接
use_ssl = true

[ACCOUNT]
# 邮箱账号（完整邮箱地址）
email_account = 731073066@qq.com

# 邮箱密码或授权码（QQ邮箱需要使用授权码）
# 获取QQ邮箱授权码：
# 1. 登录QQ邮箱网页版
# 2. 设置 → 账户
# 3. 开启POP3/IMAP/SMTP服务
# 4. 获取16位授权码
email_password = 你的16位授权码

[SAVE]
# 附件保存目录（需要写权限）
attachment_dir = /tmp/Email_Attachments/

[OPTIONS]
# 处理邮件后是否标记为已读
mark_as_read = false

# 正文预览长度（字符）
preview_length = 200