<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微恐咖啡厅 - 极简版演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #6a4e39 0%, #3e2723 100%);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .game-container {
            width: 750px;
            height: 1334px;
            background: linear-gradient(135deg, #8b4513 0%, #3e2723 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }
        
        .game-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
        }
        
        .game-title {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .game-subtitle {
            font-size: 16px;
            color: #ccc;
            margin-top: 5px;
        }
        
        .game-content {
            padding: 20px;
            height: calc(100% - 160px);
        }
        
        .status-bar {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        .status-icon {
            font-size: 24px;
        }
        
        .main-controls {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-button {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            border: none;
            border-radius: 15px;
            padding: 25px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.3);
        }
        
        .control-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(255, 152, 0, 0.5);
        }
        
        .control-button:active {
            transform: translateY(-2px);
        }
        
        .control-button.disabled {
            background: linear-gradient(135deg, #757575 0%, #424242 100%);
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .control-icon {
            font-size: 28px;
        }
        
        .stats-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .stats-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .stats-content {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        .energy-bar-container {
            margin-top: 20px;
        }
        
        .energy-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .energy-bar {
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50 0%, #8bc34a 100%);
            border-radius: 10px;
            transition: width 0.5s;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .action-button {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            border: none;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-button:hover {
            transform: translateY(-3px);
        }
        
        .action-button.share {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        }
        
        .action-button.restart {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        
        .game-footer {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            text-align: center;
            position: absolute;
            bottom: 0;
            width: 100%;
        }
        
        .game-status {
            font-size: 14px;
            color: #aaa;
        }
        
        .effect {
            position: absolute;
            font-size: 48px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.5s;
        }
        
        .coffee-effect {
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
        }
        
        .customer-effect {
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
        }
        
        /* 微信环境提示 */
        .wechat-tip {
            background: rgba(7, 193, 96, 0.2);
            border: 1px solid #07c160;
            border-radius: 8px;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
        }
        
        .wechat-icon {
            color: #07c160;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        /* 响应式调整 */
        @media (max-width: 800px) {
            .game-container {
                width: 100%;
                height: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="game-title">☕ 微恐咖啡厅 - 极简版</div>
            <div class="game-subtitle">今天上线的微信小游戏演示</div>
        </div>
        
        <div class="game-content">
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-icon">💰</span>
                    <span class="status-value" id="gold">100</span>
                </div>
                <div class="status-item">
                    <span class="status-icon">⏱️</span>
                    <span class="status-value" id="timer">00:00</span>
                </div>
            </div>
            
            <div class="main-controls">
                <button class="control-button" id="makeCoffeeBtn">
                    <span class="control-icon">☕</span>
                    <span>制作咖啡 (-10⚡)</span>
                </button>
                
                <button class="control-button" id="serveCustomerBtn">
                    <span class="control-icon">👥</span>
                    <span>服务顾客 (-1☕)</span>
                </button>
            </div>
            
            <div class="stats-panel">
                <div class="stats-title">📊 游戏统计</div>
                <div class="stats-content">
                    <div class="stat-item">
                        <div class="stat-label">制作咖啡</div>
                        <div class="stat-value" id="coffeeMade">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">服务顾客</div>
                        <div class="stat-value" id="customersServed">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">游戏得分</div>
                        <div class="stat-value" id="gameScore">1000</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">游戏状态</div>
                        <div class="stat-value" id="gameState">进行中</div>
                    </div>
                </div>
                
                <div class="energy-bar-container">
                    <div class="energy-label">
                        <span>⚡ 能量:</span>
                        <span id="energyPercent">100%</span>
                    </div>
                    <div class="energy-bar">
                        <div class="energy-fill" id="energyFill" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
            
            <div class="wechat-tip">
                <div class="wechat-icon">📱</div>
                <div>微信小游戏版本支持：分享、登录、震动反馈</div>
            </div>
            
            <div class="action-buttons">
                <button class="action-button share" id="shareBtn">
                    📤 分享游戏
                </button>
                <button class="action-button" id="loginBtn">
                    🔑 微信登录
                </button>
                <button class="action-button" id="vibrateBtn">
                    📳 震动反馈
                </button>
                <button class="action-button restart" id="restartBtn">
                    🔄 重新开始
                </button>
            </div>
        </div>
        
        <div class="game-footer">
            <div class="game-status">
                状态: <span id="statusText">游戏进行中...</span> | 
                版本: v1.0.0-quick | 
                构建时间: 2026-03-06
            </div>
        </div>
        
        <!-- 效果动画 -->
        <div class="effect coffee-effect" id="coffeeEffect">☕</div>
        <div class="effect customer-effect" id="customerEffect">👥</div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            gold: 100,
            energy: 100,
            coffeeMade: 0,
            customersServed: 0,
            gameTime: 0,
            gameScore: 1000,
            isPlaying: true
        };
        
        // 游戏计时器
        let gameTimer;
        
        // DOM元素
        const goldElement = document.getElementById('gold');
        const timerElement = document.getElementById('timer');
        const coffeeMadeElement = document.getElementById('coffeeMade');
        const customersServedElement = document.getElementById('customersServed');
        const gameScoreElement = document.getElementById('gameScore');
        const energyFillElement = document.getElementById('energyFill');
        const energyPercentElement = document.getElementById('energyPercent');
        const statusTextElement = document.getElementById('statusText');
        
        // 按钮元素
        const makeCoffeeBtn = document.getElementById('makeCoffeeBtn');
        const serveCustomerBtn = document.getElementById('serveCustomerBtn');
        const shareBtn = document.getElementById('shareBtn');
        const loginBtn = document.getElementById('loginBtn');
        const vibrateBtn = document.getElementById('vibrateBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        // 效果元素
        const coffeeEffect = document.getElementById('coffeeEffect');
        const customerEffect = document.getElementById('customerEffect');
        
        // 初始化游戏
        function initGame() {
            console.log('🎮 微恐咖啡厅极简版 - 游戏初始化');
            
            // 开始游戏计时
            startGameTimer();
            
            // 更新UI
            updateUI();
            
            // 设置按钮事件
            setupButtonEvents();
            
            // 检查微信环境
            checkWeChatEnvironment();
        }
        
        // 开始游戏计时器
        function startGameTimer() {
            gameTimer = setInterval(() => {
                gameState.gameTime++;
                
                // 自然能量恢复
                if (gameState.isPlaying) {
                    gameState.energy = Math.min(100, gameState.energy + 0.1);
                }
                
                updateUI();
            }, 1000);
        }
        
        // 更新UI
        function updateUI() {
            // 更新金币
            goldElement.textContent = gameState.gold;
            
            // 更新时间
            const minutes = Math.floor(gameState.gameTime / 60);
            const seconds = gameState.gameTime % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 更新统计
            coffeeMadeElement.textContent = gameState.coffeeMade;
            customersServedElement.textContent = gameState.customersServed;
            
            // 计算并更新得分
            calculateGameScore();
            gameScoreElement.textContent = gameState.gameScore;
            
            // 更新能量条
            const energyPercent = Math.floor(gameState.energy);
            energyFillElement.style.width = `${energyPercent}%`;
            energyPercentElement.textContent = `${energyPercent}%`;
            
            // 更新按钮状态
            updateButtonStates();
            
            // 更新状态文本
            statusTextElement.textContent = gameState.isPlaying ? '游戏进行中...' : '游戏暂停';
        }
        
        // 计算游戏得分
        function calculateGameScore() {
            gameState.gameScore = 
                gameState.gold * 10 + 
                gameState.coffeeMade * 50 + 
                gameState.customersServed * 100;
        }
        
        // 更新按钮状态
        function updateButtonStates() {
            // 制作咖啡按钮
            const canMakeCoffee = gameState.energy >= 10;
            makeCoffeeBtn.disabled = !canMakeCoffee;
            makeCoffeeBtn.classList.toggle('disabled', !canMakeCoffee);
            
            // 服务顾客按钮
            const canServeCustomer = gameState.coffeeMade > 0;
            serveCustomerBtn.disabled = !canServeCustomer;
            serveCustomerBtn.classList.toggle('disabled', !canServeCustomer);
        }
        
        // 设置按钮事件
        function setupButtonEvents() {
            // 制作咖啡
            makeCoffeeBtn.addEventListener('click', () => {
                if (gameState.energy < 10) {
                    showToast('能量不足！');
                    return;
                }
                
                // 消耗能量
                gameState.energy -= 10;
                
                // 制作咖啡
                gameState.coffeeMade++;
                
                // 获得金币
                gameState.gold += 5;
                
                console.log(`☕ 制作了第${gameState.coffeeMade}杯咖啡，获得5金币`);
                
                // 显示效果
                showCoffeeEffect();
                
                // 震动反馈
                vibrate();
                
                updateUI();
            });
            
            // 服务顾客
            serveCustomerBtn.addEventListener('click', () => {
                if (gameState.coffeeMade === 0) {
                    showToast('没有咖啡可以服务！');
                    return;
                }
                
                // 消耗咖啡
                gameState.coffeeMade--;
                
                // 服务顾客
                gameState.customersServed++;
                
                // 获得更多金币
                gameState.gold += 15;
                
                console.log(`👥 服务了第${gameState.customersServed}位顾客，获得15金币`);
                
                // 显示效果
                showCustomerEffect();
                
                // 震动反馈
                vibrate();
                
                updateUI();
            });
            
            // 分享游戏
            shareBtn.addEventListener('click', () => {
                console.log('📤 分享游戏');
                showToast('分享功能在微信中可用！');
                
                // 模拟微信分享
                if (window.isWeChat) {
                    // 实际微信分享逻辑
                    console.log('微信分享触发');
                }
            });
            
            // 微信登录
            loginBtn.addEventListener('click', () => {
                console.log('🔑 微信登录');
                showToast('登录功能在微信中可用！');
                
                // 模拟微信登录
                if (window.isWeChat) {
                    console.log('微信登录触发');
                }
            });
            
            // 震动反馈
            vibrateBtn.addEventListener('click', () => {
                console.log('📳 震动反馈');
                vibrate();
                showToast('震动反馈已触发');
            });
            
            // 重新开始
            restartBtn.addEventListener('click', () => {
                if (confirm('确定要重新开始游戏吗？当前进度将丢失。')) {
                    restartGame();
                }
            });
        }
        
        // 显示咖啡效果
        function showCoffeeEffect() {
            coffeeEffect.style.opacity = '1';
            coffeeEffect.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                coffeeEffect.style.opacity = '0';
                coffeeEffect.style.transform = 'translate(-50%, -50%) scale(0.5)';
            }, 1000);
        }
        
        // 显示顾客效果
        function showCustomerEffect() {
            customerEffect.style.opacity = '1';
            customerEffect.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                customerEffect.style.opacity = '0';
                customerEffect.style.transform = 'translate(-50%, -50%) scale(0.5)';
            }, 1000);
        }
        
        // 震动反馈
        function vibrate() {
            // 优先使用Web Vibration API
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            // 模拟微信震动
            else if (window.isWeChat) {
                console.log('微信震动触发');
            }
        }
        
        // 显示提示
        function showToast(message) {
            // 创建提示元素
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                z-index: 1000;
                font-size: 16px;
                animation: fadeInOut 2s ease-in-out;
            `;
            
            // 添加动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeInOut {
                    0% { opacity: 0; transform: translate(-50%, -40px); }
                    10% { opacity: 1; transform: translate(-50%, -50%); }
                    90% { opacity: 1; transform: translate(-50%, -50%); }
                    100% { opacity: 0; transform: translate(-50%, -60px); }
                }
            `;
            document.head.appendChild(style);
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
                document.head.removeChild(style);
            }, 2000);
        }
        
        // 检查微信环境
        function checkWeChatEnvironment() {
            // 模拟微信环境检测
            const ua = navigator.userAgent.toLowerCase();
            window.isWeChat = ua.includes('micromessenger');
            
            if (window.isWeChat) {
                console.log('📱 检测到微信环境');
                statusTextElement.textContent = '微信小游戏模式';
            } else {
                console.log('🖥️ 非微信环境，演示模式');
            }
        }
        
        // 重新开始游戏
        function restartGame() {
            console.log('🔄 重新开始游戏');
            
            // 停止计时器
            clearInterval(gameTimer);
            
            // 重置游戏状态
            gameState = {
                gold: 100,
                energy: 100,
                coffeeMade: 0,
                customersServed: 0,
                gameTime: 0,
                gameScore: 1000,
                isPlaying: true
            };
            
            // 重新开始计时器
            startGameTimer();
            
            // 更新UI
            updateUI();
            
            showToast('游戏已重新开始！');
        }
        
        // 游戏数据导出
        function exportGameData() {
            const gameData = {
                version: '1.0.0-quick-demo',
                timestamp: new Date().toISOString(),
                gold: gameState.gold,
                coffeeMade: gameState.coffeeMade,
                customersServed: gameState.customersServed,
                playTime: gameState.gameTime,
                score: gameState.gameScore
            };
            
            console.log('🎮 游戏数据导出:', gameData);
            return JSON.stringify(gameData, null, 2);
        }
        
        // 页面加载完成后初始化游戏
        window.addEventListener('load', initGame);
        
        // 页面关闭前保存游戏状态
        window.addEventListener('beforeunload', () => {
            const gameData = exportGameData();
            localStorage.setItem('coffeeHorrorQuickSave', gameData);
        });
        
        // 尝试加载保存的游戏状态
        window.addEventListener('load', () => {
            const savedGame = localStorage.getItem('coffeeHorrorQuickSave');
            if (savedGame) {
                try {
                    const gameData = JSON.parse(savedGame);
                    console.log('🎮 加载保存的游戏状态:', gameData);
                    
                    // 应用保存的状态（简化处理）
                    // gameState = { ...gameState, ...gameData };
                    // updateUI();
                } catch (error) {
                    console.error('加载保存状态失败:', error);
                }
            }
        });
        
        // 添加键盘控制
        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault();
                makeCoffeeBtn.click();
            } else if (event.code === 'Enter') {
                event.preventDefault();
                serveCustomerBtn.click();
            } else if (event.code === 'KeyR' && event.ctrlKey) {
                event.preventDefault();
                restartGame();
            }
        });
        
        // 添加触摸设备优化
        document.addEventListener('touchstart', () => {
            // 防止触摸时滚动
        }, { passive: false });
        
        // 控制台欢迎信息
        console.log('🎮 微恐咖啡厅极简版演示已加载');
        console.log('🎮 游戏控制:');
        console.log('  - 空格键: 制作咖啡');
        console.log('  - 回车键: 服务顾客');
        console.log('  - Ctrl+R: 重新开始');
        console.log('🎮 目标: 今天在微信小程序上玩到！');
    </script>
</body>
</html>
